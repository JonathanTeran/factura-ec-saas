name: factura_ec_app
description: "App móvil para facturación electrónica Ecuador"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.0.2

  # UI Components
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  pull_to_refresh: ^2.0.0
  animated_bottom_navigation_bar: ^1.3.3

  # Forms & Validation
  reactive_forms: ^17.0.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.6
  share_plus: ^10.0.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

  # PDF & Printing
  printing: ^5.14.2
  pdf: ^3.10.8

  # Scanner
  mobile_scanner: ^5.1.1

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Animations
  flutter_animate: ^4.5.0

  # Charts
  fl_chart: ^0.68.0
  local_auth: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/branding/
    - assets/icons/
    - assets/fonts/
