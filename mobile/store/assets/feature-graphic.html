<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 500px; overflow: hidden;
    font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1D4ED8 0%, #2563EB 45%, #3B82F6 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .glow {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: .35;
  }
  .g1 { width: 420px; height: 420px; background: #93C5FD; top: -160px; right: -80px; }
  .g2 { width: 360px; height: 360px; background: #1E3A8A; bottom: -180px; left: -60px; }
  .wrap { display: flex; align-items: center; gap: 44px; z-index: 1; padding: 0 70px; }
  .icon {
    width: 190px; height: 190px; border-radius: 44px;
    box-shadow: 0 24px 60px rgba(0,0,0,.35);
  }
  .title { color: #fff; font-size: 74px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.05; }
  .tag { color: rgba(255,255,255,.92); font-size: 30px; font-weight: 500; margin-top: 14px; }
  .chips { display: flex; gap: 10px; margin-top: 22px; }
  .chip {
    background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.35);
    color: #fff; font-size: 19px; font-weight: 600;
    padding: 8px 18px; border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="wrap">
    <img class="icon" src="file:///Users/jonathanteran/desarrollo/factura-ec-saas/mobile/assets/branding/facturon_icon.png" alt="">
    <div>
      <div class="title">Facturón EC</div>
      <div class="tag">Facturación electrónica SRI, desde tu bolsillo</div>
      <div class="chips">
        <span class="chip">Facturas en segundos</span>
        <span class="chip">Autorizado por el SRI</span>
        <span class="chip">POS y proformas</span>
      </div>
    </div>
  </div>
</body>
</html>
