# ===========================================================================
# Factura EC — Nginx Production Config
# ===========================================================================
# Topología: el PANEL (Next.js) se sirve en la raíz; el BACKEND Laravel
# (API v1, Filament /admin, portal, etc.) en rutas específicas. El proxy
# server-side del frontend llama a la API por la red interna (http://nginx).
#
# Requiere certificados SSL en /etc/nginx/ssl/ (fullchain.pem + privkey.pem).
# REVISAR antes de producción: rutas de assets de Filament, y confirmar que
# la landing (welcome.blade) se sirva donde corresponda (hoy la raíz es el panel).
# ===========================================================================

upstream frontend_app { server frontend:3000; }

# --- Rutas que pertenecen a Laravel (front controller) --------------------
map $uri $is_laravel {
    default                 0;
    "~^/api/v1(/|$)"        1;
    "~^/admin(/|$)"         1;
    "~^/portal(/|$)"        1;
    "~^/livewire(/|$)"      1;
    "~^/sanctum(/|$)"       1;
    "~^/up$"                1;
    "~^/storage(/|$)"       1;
    "~^/broadcasting(/|$)"  1;
}

# --- HTTP: challenge de Let's Encrypt + API interna, resto a HTTPS ---------
server {
    listen 80;
    listen [::]:80;
    server_name facturacion.amephia.com;
    root /var/www/html/public;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    # Llamada interna del frontend (http://nginx/api/v1/...) sin redirección.
    location ^~ /api/v1 {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ----------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name facturacion.amephia.com;

    root /var/www/html/public;
    index index.php;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 50M;
    client_body_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear archivos ocultos y sensibles.
    location ~ /\.(?!well-known).* { deny all; }
    location ~ ^/(\.env|artisan|composer\.(json|lock)|package\.json) { deny all; }

    # Front controller de Laravel (API v1, admin, portal, livewire, storage…)
    location @laravel { try_files $uri $uri/ /index.php?$query_string; }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Enrutado principal:
    #  - rutas de Laravel  -> front controller (php-fpm)
    #  - archivo existente -> se sirve (assets publicados en public/)
    #  - lo demás          -> panel Next.js
    location / {
        if ($is_laravel) { rewrite ^ /index.php?$query_string last; }
        try_files $uri @frontend;
    }

    location @frontend {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
