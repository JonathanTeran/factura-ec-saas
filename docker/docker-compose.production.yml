version: '3.8'

# ===========================================
# Factura EC SaaS - Production (1 CPU / small VPS)
# ===========================================

services:
  # ===========================================
  # Laravel Application (PHP-FPM)
  # ===========================================
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: factura-ec-app
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    networks:
      - factura-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================
  # Nginx Web Server
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: factura-ec-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../backend/public:/var/www/html/public:ro
      - ./nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - factura-network
    depends_on:
      - app

  # ===========================================
  # MySQL 8.0
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: factura-ec-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-factura_ec}
      MYSQL_USER: ${DB_USERNAME:-factura}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - mysql_backups:/backups
    networks:
      - factura-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis 7
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: factura-ec-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - factura-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Laravel Horizon (Queue Worker)
  # ===========================================
  horizon:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: factura-ec-horizon
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    networks:
      - factura-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan horizon
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Laravel Scheduler (Cron)
  # ===========================================
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: factura-ec-scheduler
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    networks:
      - factura-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction 2>&1;
        sleep 60;
      done"

  # ===========================================
  # Meilisearch (Full-text Search)
  # ===========================================
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: factura-ec-meilisearch
    restart: always
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - factura-network
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_NO_ANALYTICS: true

  # ===========================================
  # MinIO (S3-compatible Storage)
  # ===========================================
  minio:
    image: minio/minio
    container_name: factura-ec-minio
    restart: always
    volumes:
      - minio_data:/data
    networks:
      - factura-network
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  factura-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  mysql_backups:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  minio_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
